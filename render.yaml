# https://render.com — free Web Service (sleeps after ~15 min idle; wakes on next visit)
services:
  - type: web
    name: nifty500-rsi-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
